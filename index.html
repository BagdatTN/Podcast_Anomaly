<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Подкаст-платформа</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Плеер -->
        <div class="player-container">
            <div class="player">
                <div class="player__info">
                    <span class="player__title" id="nowPlayingTitle">Выберите выпуск</span>
                    <span class="player__meta" id="nowPlayingMeta"></span>
                </div>
                <div class="player__progress">
                    <span class="player__time current" id="currentTime">00:00</span>
                    <input type="range" class="player__seek" id="seek" value="0" step="0.1">
                    <span class="player__time total" id="totalTime">00:00</span>
                </div>
                <div class="player__controls">
                    <button class="player__btn" id="rewindBtn">-10</button>
                    <button class="player__btn player__btn--primary" id="playPauseBtn"><i class="fas fa-play" id="playPauseIcon"></i></button>
                    <button class="player__btn" id="forwardBtn">+10</button>
                    <div class="player__speed">
                        <button class="speed-btn" id="speedBtn">1x</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Список выпусков -->
        <div class="episodes-list" id="episodesList">
            <!-- Заполняется из JavaScript -->
        </div>
    </div>

    <script src="player.js"></script>
    <script src="app.js"></script>
</body>
</html>
